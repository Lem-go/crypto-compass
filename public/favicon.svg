<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="64" fill="url(#bgGradient)"/>
  
  <!-- Lens circle with glow -->
  <circle cx="128" cy="128" r="85" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="20" filter="url(#glow)"/>
  
  <!-- Inner circle -->
  <circle cx="128" cy="128" r="65" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Letter C in the center -->
  <text x="128" y="155" font-size="120" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif" letter-spacing="2">C</text>
</svg>
